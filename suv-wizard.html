  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #E8D48B;
    --dark: #1A1A2E;
    --darker: #0F0F1A;
    --card-bg: #232340;
    --text: #F0EDE6;
    --text-muted: #9B97A0;
    --yes: #4CAF50;
    --yes-glow: rgba(76, 175, 80, 0.3);
    --no: #ef5350;
    --no-glow: rgba(239, 83, 80, 0.3);

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--darker);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .bg-pattern {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:

      radial-gradient(ellipse at 80% 20%, rgba(108,99,255,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(201,168,76,0.03) 0%, transparent 40%);
  }

  .app {
    max-width: 500px;
    margin: 0 auto;
    padding: 16px;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    text-align: center;
    padding: 16px 0 8px;
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header .subtitle {
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-top: 4px;
  }

  /* Progress */
  .progress {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0;
    flex-shrink: 0;
  }
  .progress-bar-bg {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* Card */
  .card-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    perspective: 1000px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transition: transform 0.5s ease, opacity 0.5s ease;
    position: relative;
  }
  .card.swipe-right {
    transform: translateX(120%) rotate(15deg);
    opacity: 0;
  }
  .card.swipe-left {
    transform: translateX(-120%) rotate(-15deg);
    opacity: 0;
  }
  .card.entering {
    transform: scale(0.9);
    opacity: 0;
  }

  /* Photo area */
  .card-photo {
    position: relative;
    width: 100%;
    height: 320px;
    background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
    overflow: hidden;
    cursor: pointer;
  }
  .card-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.3s ease;
  }
  .card-photo .gradient-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    pointer-events: none;
  }

  /* Photo toggle tabs */
  .photo-tabs {
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    display: flex;
    gap: 6px;
    z-index: 2;
  }
  .photo-tab {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.3s;
  }
  .photo-tab.active {
    background: white;
  }

  .photo-label {
    position: absolute;
    top: 24px; left: 14px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.7);
    z-index: 2;
  }

  /* Loading placeholder */
  .photo-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
  }
  .photo-loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Stamp overlays */
  .stamp {
    position: absolute;
    top: 50%;
    transform: translateY(-50%) rotate(-15deg);
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 8px 24px;
    border-radius: 12px;
    border: 4px solid;
    opacity: 0;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .stamp.like {
    left: 20px;
    color: var(--yes);
    border-color: var(--yes);
  }
  .stamp.nope {
    right: 20px;
    color: var(--no);
    border-color: var(--no);
    transform: translateY(-50%) rotate(15deg);
  }
  .stamp.visible { opacity: 0.9; }

  /* Card info */
  .card-info {
    padding: 20px;
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .card-brand-price {
    color: var(--gold);
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .card-desc {
    color: var(--text-muted);
    font-size: 0.88rem;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .card-tag {
    background: rgba(201,168,76,0.12);
    color: var(--gold);
    font-size: 0.72rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.15);
  }

  /* Action buttons */
  .actions {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    padding: 20px 0;
    flex-shrink: 0;
  }
  .action-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid;
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;

  .action-btn:active {

  .btn-no {

    color: var(--no);
  }
  .btn-no:hover, .btn-no:active {
    background: var(--no-glow);
    box-shadow: 0 0 30px var(--no-glow);
  }
  .btn-yes {
    border-color: var(--yes);
    color: var(--yes);
  }
  .btn-yes:hover, .btn-yes:active {
    background: var(--yes-glow);
    box-shadow: 0 0 30px var(--yes-glow);
  }
  .btn-undo {
    width: 48px;
    height: 48px;
    border-color: var(--gold);
    color: var(--gold);
    font-size: 1.2rem;
  }
  .btn-undo:hover {
    background: rgba(201,168,76,0.15);
  }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 20px;

  .welcome-grid {

  .welcome-grid-img img {

    height: 100%;

  }
  @media (min-width: 600px) {
    .card-photo { height: 380px; }
  }
</style>

// ═══════════════════════════════════════════════════════════════
// IMAGE FETCHING — Wikipedia REST API
// ═══════════════════════════════════════════════════════════════
const imageCache = {};

async function fetchWikiImage(title, fallbackTitle) {
  if (imageCache[title]) return imageCache[title];
  const titles = [title, fallbackTitle].filter(Boolean);
  for (const t of titles) {
    try {
      const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      const imgUrl = data.originalimage?.source || data.thumbnail?.source;
      if (imgUrl) {
        imageCache[title] = imgUrl;
        return imgUrl;
      }
    } catch (e) { /* try next */ }
  }
  return null;
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ═══════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════
let currentIndex = 0;
let liked = [];
let passed = [];
let history = []; // for undo
let currentPhotoView = 0; // 0 = exterior, 1 = interior
let vehicleImages = {}; // { vehicleName: { exterior: url, interior: url } }
let isAnimating = false;

// Shuffle vehicles for variety
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let deck = shuffle(VEHICLES);

// ═══════════════════════════════════════════════════════════════
// PREFETCH IMAGES
// ═══════════════════════════════════════════════════════════════
async function prefetchVehicleImages(vehicle) {
  if (vehicleImages[vehicle.name]) return vehicleImages[vehicle.name];

  const [exterior] = await Promise.all([
    fetchWikiImage(vehicle.wiki, vehicle.wikiAlt)
  ]);

  vehicleImages[vehicle.name] = { exterior };
  return vehicleImages[vehicle.name];
}

async function prefetchUpcoming() {
  const upcoming = deck.slice(currentIndex, currentIndex + 3);
  await Promise.allSettled(upcoming.map(v => prefetchVehicleImages(v)));
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function renderApp() {
  const app = document.getElementById('app');

  if (currentIndex < 0) currentIndex = 0;

  // Welcome screen
  if (currentIndex === -1 || (currentIndex === 0 && liked.length === 0 && passed.length === 0 && history.length === 0)) {
    renderWelcome();
    return;
  }

  // Results
  if (currentIndex >= deck.length) {
    renderResults();
    return;
  }

  renderCard();
}

async function renderWelcome() {
  const app = document.getElementById('app');

  // Fetch a few preview images
  const previewVehicles = [deck[0], deck[1], deck[2], deck[3], deck[4], deck[5]].filter(Boolean);
  const imgPromises = previewVehicles.map(v => fetchWikiImage(v.wiki, v.wikiAlt));
  const imgs = await Promise.all(imgPromises);

  const gridHTML = imgs.slice(0, 6).map((src, i) => `
    <div class="welcome-grid-img">
      ${src ? `<img src="${src}" alt="${previewVehicles[i].name}" onerror="this.parentElement.style.background='var(--card-bg)'">` : ''}
    </div>
  `).join('');

  app.innerHTML = `
    <header>
      <h1>Luxury SUV Finder</h1>
    </header>
    <div class="welcome">
      <div class="welcome-grid">${gridHTML}</div>
      <h2>Find Your Dream SUV</h2>
      <p>We'll show you ${deck.length} luxury SUVs one at a time. Just tap <strong>YES</strong> if you love how it looks or <strong>NO</strong> to pass.</p>
      <p style="font-size:0.85rem">Tap the photo to switch between exterior and interior views.</p>
      <button class="start-btn" onclick="startSwiping()">Let's Go</button>
    </div>
  `;
}

function startSwiping() {
  currentIndex = 0;
  liked = [];
  passed = [];
  history = [];
  prefetchUpcoming();
  renderCard();
}

async function renderCard() {
  const app = document.getElementById('app');
  const vehicle = deck[currentIndex];
  currentPhotoView = 0;

  // Ensure images are loaded
  const imgs = await prefetchVehicleImages(vehicle);
  prefetchUpcoming(); // prefetch next ones

  const exteriorSrc = imgs.exterior || '';
  const photoViews = [exteriorSrc].filter(Boolean);
  const photoCount = Math.max(1, photoViews.length);

  const tabsHTML = photoCount > 1
    ? `<div class="photo-tabs">${Array.from({length: photoCount}, (_, i) =>
        `<div class="photo-tab ${i === 0 ? 'active' : ''}" onclick="switchPhoto(${i})"></div>`
      ).join('')}</div>`
    : '';

  const labelText = 'Exterior';

  const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(vehicle.search)}&tbm=isch`;

  app.innerHTML = `
    <header>
      <h1>Luxury SUV Finder</h1>
      <div class="subtitle">Tap the photo to see more images</div>
    </header>
    <div class="progress">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width: ${((currentIndex) / deck.length) * 100}%"></div>
      </div>
      <span class="progress-text">${currentIndex + 1} / ${deck.length}</span>
    </div>
    <div class="card-container">
      <div class="card" id="card">
        <div class="stamp like" id="stampLike">LIKE</div>
        <div class="stamp nope" id="stampNope">NOPE</div>
        <div class="card-photo" onclick="window.open('${searchUrl}', '_blank')">
          ${exteriorSrc
            ? `<img id="cardPhoto" src="${exteriorSrc}" alt="${vehicle.name}" onerror="this.style.display='none'">`
            : `<div class="photo-loading"><div class="spinner"></div></div>`
          }
          <div class="gradient-overlay"></div>
          <div class="photo-label">${labelText}</div>
        </div>
        <div class="card-info">
          <div class="card-name">${vehicle.name}</div>
          <div class="card-brand-price">${vehicle.brand} &middot; Starting at ${vehicle.price}</div>
          <div class="card-desc">${vehicle.desc}</div>
          <div class="card-tags">
            ${vehicle.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="action-btn btn-undo" onclick="undo()" title="Undo" ${history.length === 0 ? 'style="opacity:0.3;pointer-events:none"' : ''}>&#8630;</button>
      <button class="action-btn btn-no" onclick="swipe('no')" title="Pass">&#10007;</button>
      <button class="action-btn btn-yes" onclick="swipe('yes')" title="Love it">&#10003;</button>
    </div>
    <div class="key-hint">
      <kbd>&larr;</kbd> pass &nbsp;&middot;&nbsp; <kbd>&rarr;</kbd> like &nbsp;&middot;&nbsp; <kbd>Z</kbd> undo
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// SWIPE ACTIONS
// ═══════════════════════════════════════════════════════════════
function swipe(direction) {
  if (isAnimating) return;
  if (currentIndex >= deck.length) return;

  isAnimating = true;
  const card = document.getElementById('card');
  const vehicle = deck[currentIndex];

  // Show stamp
  if (direction === 'yes') {
    document.getElementById('stampLike').classList.add('visible');
    card.classList.add('swipe-right');
    liked.push(vehicle);
  } else {
    document.getElementById('stampNope').classList.add('visible');
    card.classList.add('swipe-left');
    passed.push(vehicle);
  }

  history.push({ index: currentIndex, direction });

  setTimeout(() => {
    currentIndex++;
    isAnimating = false;
    if (currentIndex >= deck.length) {
      renderResults();
    } else {
      renderCard();
    }
  }, 400);
}

function undo() {
  if (history.length === 0 || isAnimating) return;

  const last = history.pop();
  if (last.direction === 'yes') {
    liked.pop();
  } else {
    passed.pop();
  }
  currentIndex = last.index;
  renderCard();
}

// Keyboard controls
document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox')?.classList.contains('open')) return;
  if (currentIndex >= deck.length || currentIndex < 0) return;

  if (e.key === 'ArrowRight' || e.key === 'l') swipe('yes');
  else if (e.key === 'ArrowLeft' || e.key === 'h') swipe('no');
  else if (e.key === 'z' || e.key === 'Z') undo();
});

// ═══════════════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════════════
async function renderResults() {
  const app = document.getElementById('app');

  if (liked.length === 0) {
    app.innerHTML = `
      <header>
        <h1>Luxury SUV Finder</h1>
      </header>
      <div class="results-empty">
        <div class="emoji">😅</div>
        <h3>Tough Crowd!</h3>
        <p>You didn't like any of the SUVs. Let's try again — maybe give a few a second chance?</p>
        <button class="restart-btn" onclick="startSwiping()">Try Again</button>
      </div>
    `;
    return;
  }

  // Show loading
  app.innerHTML = `
    <header>
      <h1>Luxury SUV Finder</h1>
    </header>
    <div class="results-header">
      <h2>Loading your favorites...</h2>
      <p><span class="photo-loading" style="position:static;background:none;display:inline-flex"><span class="spinner"></span></span></p>
    </div>
  `;

  // Fetch images for liked vehicles
  const imgPromises = liked.map(v => prefetchVehicleImages(v));
  await Promise.allSettled(imgPromises);

  const cardsHTML = liked.map((v, i) => {
    const imgs = vehicleImages[v.name] || {};
    const imgSrc = imgs.exterior || '';
    const imgSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(v.search)}&tbm=isch`;
    const interiorUrl = `https://www.google.com/search?q=${encodeURIComponent(v.name + ' ' + new Date().getFullYear() + ' interior')}&tbm=isch`;
    const videoUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(v.name + ' ' + new Date().getFullYear() + ' review')}`;
    const reviewUrl = `https://www.google.com/search?q=${encodeURIComponent(v.name + ' ' + new Date().getFullYear() + ' review test drive')}`;

    return `
      <div class="result-card">
        <div class="result-card-img" onclick="${imgSrc ? `openLightbox('${imgSrc}')` : ''}">
          ${imgSrc ? `<img src="${imgSrc}" alt="${v.name}" onerror="this.style.display='none'">` : ''}
          <div class="rank-badge">${i === 0 ? '&#9829; #1 Favorite' : `#${i + 1}`}</div>
        </div>
        <div class="result-card-body">
          <h3>${v.name}</h3>
          <div class="brand-price">${v.brand} &middot; Starting at ${v.price}</div>
          <div class="desc">${v.desc}</div>
          <div class="tags">
            ${v.tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <div class="result-links">
            <a class="result-link" href="${imgSearchUrl}" target="_blank" rel="noopener">Photos</a>
            <a class="result-link" href="${interiorUrl}" target="_blank" rel="noopener">Interior</a>
            <a class="result-link" href="${videoUrl}" target="_blank" rel="noopener">Videos</a>
            <a class="result-link" href="${reviewUrl}" target="_blank" rel="noopener">Reviews</a>
          </div>
        </div>
      </div>
    `;
  }).join('');

  app.innerHTML = `
    <header>
      <h1>Luxury SUV Finder</h1>
    </header>
    <div class="results">
      <div class="results-header">
        <h2>Your Favorites</h2>
        <p>You liked ${liked.length} out of ${deck.length} SUVs. Here are the ones that caught your eye!</p>
      </div>
      ${cardsHTML}
      <button class="restart-btn" onclick="startSwiping()">Start Over</button>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
renderWelcome();
</script>
