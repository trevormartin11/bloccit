<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury SUV Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #E8D48B;
    --dark: #1A1A2E;
    --darker: #0F0F1A;
    --card-bg: #232340;
    --card-hover: #2E2E50;
    --text: #F0EDE6;
    --text-muted: #9B97A0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--darker);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-pattern {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(108,99,255,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(201,168,76,0.03) 0%, transparent 40%);
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    padding: 30px 0 10px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  header p {
    color: var(--text-muted);
    margin-top: 8px;
    font-size: 1.05rem;
    font-weight: 300;
  }

  /* Progress */
  .progress-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 24px auto 32px;
    max-width: 400px;
  }
  .progress-dot {
    width: 44px; height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.1);
    transition: all 0.4s ease;
  }
  .progress-dot.active { background: var(--gold); }
  .progress-dot.completed { background: var(--gold-light); opacity: 0.5; }

  /* Step */
  .step { display: none; animation: fadeIn 0.5s ease; }
  .step.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-question {
    text-align: center;
    margin-bottom: 28px;
  }
  .step-question h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  .step-question p { color: var(--text-muted); font-size: 0.95rem; }

  /* Option Cards — image heavy */
  .options-grid {
    display: grid;
    gap: 18px;
  }
  .options-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .options-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .options-grid.cols-4 { grid-template-columns: repeat(2, 1fr); }

  @media (min-width: 900px) {
    .options-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 600px) {
    .options-grid.cols-2, .options-grid.cols-3, .options-grid.cols-4 {
      grid-template-columns: 1fr;
    }
  }

  .option-card {
    background: var(--card-bg);
    border: 2px solid transparent;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    overflow: hidden;
    position: relative;
  }
  .option-card:hover {
    background: var(--card-hover);
    border-color: rgba(201,168,76,0.3);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .option-card.selected {
    border-color: var(--gold);
    background: var(--card-hover);
    box-shadow: 0 0 30px rgba(201,168,76,0.15);
  }
  .option-card.selected::after {
    content: '✓';
    position: absolute;
    top: 12px; right: 12px;
    width: 30px; height: 30px;
    background: var(--gold);
    color: var(--dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 15px;
    z-index: 3;
  }

  .option-visual {
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    position: relative;
    overflow: hidden;
    background-size: cover;
    background-position: center;
  }
  .option-visual img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  .option-visual .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.2) 100%);
    z-index: 2;
  }
  .option-visual .emoji-fallback {
    z-index: 2;
    position: relative;
  }

  .option-info {
    padding: 16px 18px 18px;
  }
  .option-info h3 {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .option-info p {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* Navigation */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 36px;
    padding-bottom: 40px;
  }
  .btn {
    padding: 14px 36px;
    border: none;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
  }
  .btn-back {
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-back:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .btn-next {
    background: linear-gradient(135deg, var(--gold), #B8942F);
    color: var(--dark);
    font-weight: 600;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.3); }
  .btn-next:disabled {
    opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none;
  }
  .btn-restart {
    background: rgba(255,255,255,0.05);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.15);
    margin-top: 20px;
  }
  .btn-restart:hover { background: rgba(255,255,255,0.1); }

  /* Results */
  .results-intro {
    text-align: center;
    margin-bottom: 40px;

  .results-intro h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;

  .results-intro p { color: var(--text-muted); }

  .result-card {
    background: var(--card-bg);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 28px;
    border: 1px solid rgba(255,255,255,0.06);

  }
  .result-card:hover {

    box-shadow: 0 10px 40px rgba(0,0,0,0.3);

  .result-rank {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--gold), #B8942F);
    color: var(--dark);
    padding: 6px 16px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.85rem;
    margin-bottom: 12px;
  }
  .result-rank.rank-1 { font-size: 1rem; padding: 8px 20px; }

  .result-body {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 0;
  }
  @media (max-width: 700px) {
    .result-body { grid-template-columns: 1fr; }

  .result-image {
    min-height: 280px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .result-image img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    transition: transform 0.4s ease;
  }
  .result-card:hover .result-image img {

  }
  .result-image .gradient-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .result-image .img-overlay {

    inset: 0;
    background: linear-gradient(to right, transparent 60%, rgba(35,35,64,0.95) 100%),

  }
  .result-image .fallback-label {

    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    text-align: center;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    padding: 20px;
    opacity: 0.8;
  }

  .result-details {

    font-size: 1.5rem;
    margin-bottom: 4px;
  }
  .result-details .result-subtitle {

    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 14px;
  }
  .result-details .result-desc {
    color: var(--text-muted);
    font-size: 0.88rem;
    line-height: 1.7;
    margin-bottom: 18px;
  }

  .result-tags {

    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
  }
  .result-tag {
    background: rgba(201,168,76,0.1);
    color: var(--gold);
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 0.78rem;
    font-weight: 500;
    border: 1px solid rgba(201,168,76,0.15);
  }

  .match-score {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .match-bar-bg {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
  }
  .match-bar {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 1s ease;
  }
  .match-pct {
    font-weight: 600;
    color: var(--gold);
    font-size: 0.95rem;
    min-width: 42px;
    text-align: right;
  }

  .result-cta {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 22px;
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 50px;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.3s ease;
    cursor: pointer;

  .result-cta:hover {
    background: var(--gold);

  /* Photo gallery strip on results */
  .photo-strip {

    gap: 4px;
    overflow-x: auto;
    padding: 0 0 4px;
    scrollbar-width: thin;

  .photo-strip::-webkit-scrollbar-track { background: transparent; }
  .photo-strip::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

  .photo-strip img {
    height: 80px;
    width: 120px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0.7;

  .photo-strip img:hover {

    transform: scale(1.05);

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;

    max-height: 88vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);

    top: 20px; right: 30px;
    color: white;
    font-size: 2rem;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    border: none;
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;

    text-align: center;
    padding: 50px 20px;

  .welcome-hero {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 700px;
    margin: 0 auto 40px;
    border-radius: 20px;
    overflow: hidden;
  }

    height: 180px;
    background-size: cover;
    background-position: center;
    border-radius: 12px;
    position: relative;
    overflow: hidden;

  .welcome-hero-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  @media (max-width: 500px) {

  }

    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    margin-bottom: 16px;

  .welcome p {
    color: var(--text-muted);
    max-width: 600px;
    margin: 0 auto 30px;
    line-height: 1.7;
    font-size: 1.05rem;
  }

    text-align: center;
    color: var(--gold);
    font-size: 0.85rem;
    margin-bottom: 18px;
    opacity: 0.8;

    display: inline-block;
    width: 24px; height: 24px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    header h1 { font-size: 1.8rem; }
    .step-question h2 { font-size: 1.4rem; }
    .results-intro h2 { font-size: 1.6rem; }
  }
</style>
</head>

// ═══════════════════════════════════════════════════════════════
// IMAGE CACHE — fetched from Wikipedia REST API
// ═══════════════════════════════════════════════════════════════
const imageCache = {};

async function fetchWikiImage(title, fallbackTitle) {
  const key = title;
  if (imageCache[key]) return imageCache[key];

  const titles = [title, fallbackTitle].filter(Boolean);
  for (const t of titles) {
    try {
      const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      const imgUrl = data.originalimage?.source || data.thumbnail?.source;
      if (imgUrl) {
        imageCache[key] = imgUrl;
        return imgUrl;
      }
    } catch (e) { /* try next */ }
  }
  return null;
}

// Prefetch all vehicle images on load
async function prefetchImages() {
  const promises = VEHICLES.map(v =>
    fetchWikiImage(v.wikiTitle, v.wikiTitleAlt)
  );
  await Promise.allSettled(promises);
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ═══════════════════════════════════════════════════════════════
// WIZARD STATE
// ═══════════════════════════════════════════════════════════════
let currentStep = 0;
const answers = {};

function init() {
  renderProgressBar();
  renderStep();
  prefetchImages();
}

function renderProgressBar() {
  const bar = document.getElementById('progressBar');
  const totalQ = STEPS.filter(s => s.type !== 'welcome' && s.type !== 'results').length;
  bar.innerHTML = '';
  for (let i = 0; i < totalQ; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    const adj = currentStep - 1;
    if (i < adj) dot.classList.add('completed');
    if (i === adj) dot.classList.add('active');
    bar.appendChild(dot);
  }
  bar.style.display = currentStep === 0 || currentStep === STEPS.length - 1 ? 'none' : 'flex';
}

async function renderStep() {
  const step = STEPS[currentStep];
  const wizard = document.getElementById('wizard');

  if (step.type === 'welcome') {
    // Fetch 3 hero images
    const heroPromises = [
      fetchWikiImage("Range Rover (L460)", "Range Rover"),
      fetchWikiImage("Lamborghini Urus", null),
      fetchWikiImage("Rolls-Royce Cullinan", null)
    ];
    const heroImages = await Promise.all(heroPromises);

    const heroGradients = [
      "linear-gradient(135deg, #1B4332, #2D6A4F)",
      "linear-gradient(135deg, #B8860B, #E6A817)",
      "linear-gradient(135deg, #1A0F2E, #3E2465)"
    ];
    const heroLabels = ["Range Rover", "Lamborghini Urus", "Rolls-Royce Cullinan"];

    const heroHTML = heroImages.map((img, i) => `
      <div class="welcome-hero-img" style="background: ${heroGradients[i]}">
        ${img ? `<img src="${img}" alt="${heroLabels[i]}" style="object-fit:cover;" onerror="this.style.display='none'">` : ''}
      </div>
    `).join('');

    wizard.innerHTML = `
      <div class="step active">
        <div class="welcome">
          <div class="welcome-hero">${heroHTML}</div>
          <h2>Find Your Dream Luxury SUV</h2>
          <p>You currently drive a <strong>Land Rover Evoque</strong> — great taste! Let's find your next step up. We'll ask ${STEPS.length - 2} quick questions about your style and preferences, then recommend the perfect luxury SUVs for you to test drive.</p>
          <button class="btn btn-next" onclick="nextStep()">Let's Get Started</button>
        </div>
      </div>`;
    renderProgressBar();
    return;
  }

  if (step.type === 'results') {
    await renderResults();
    renderProgressBar();
    return;
  }

  const multiNote = step.multi
    ? `<p class="multi-note">${step.maxSelect ? `Select up to ${step.maxSelect}` : 'Select all that apply'}</p>`
    : '';

  const cols = step.options.length <= 2 ? 'cols-2' : step.options.length === 3 ? 'cols-3' : 'cols-4';
  const prev = answers[step.id] || (step.multi ? [] : null);

  // Fetch images for each option in parallel
  const imgPromises = step.options.map(opt => fetchStepImage(step.id, opt.value));
  const images = await Promise.all(imgPromises);

  const optionsHTML = step.options.map((opt, i) => {
    const isSelected = step.multi
      ? (prev && prev.includes(opt.value))
      : (prev === opt.value);
    const imgSrc = images[i];
    const imgTag = imgSrc
      ? `<img src="${imgSrc}" alt="${opt.label}" onerror="this.style.display='none'"><div class="overlay"></div>`
      : `<span class="emoji-fallback">${opt.emoji}</span>`;

    return `
      <div class="option-card ${isSelected ? 'selected' : ''}"
           onclick="selectOption('${step.id}', '${opt.value}', ${step.multi}, ${step.maxSelect || 0})"
           data-value="${opt.value}">
        <div class="option-visual" style="background: ${opt.gradient}">${imgTag}</div>
        <div class="option-info">
          <h3>${opt.label}</h3>
          <p>${opt.desc}</p>
        </div>
      </div>`;
  }).join('');

  const hasSelection = step.multi
    ? (prev && prev.length > 0)
    : (prev !== null && prev !== undefined);

  wizard.innerHTML = `
    <div class="step active">
      <div class="step-question">
        <h2>${step.question}</h2>
        <p>${step.subtitle}</p>
      </div>
      ${multiNote}
      <div class="options-grid ${cols}">${optionsHTML}</div>
      <div class="nav-buttons">
        <button class="btn btn-back" onclick="prevStep()" ${currentStep <= 1 ? 'style="visibility:hidden"' : ''}>← Back</button>
        <button class="btn btn-next" id="nextBtn" onclick="nextStep()" ${!hasSelection ? 'disabled' : ''}>
          ${currentStep === STEPS.length - 2 ? 'See My Results →' : 'Next →'}
        </button>
      </div>
    </div>`;

  renderProgressBar();
}

function selectOption(stepId, value, isMulti, maxSelect) {
  if (isMulti) {
    if (!answers[stepId]) answers[stepId] = [];
    const idx = answers[stepId].indexOf(value);
    if (idx >= 0) {
      answers[stepId].splice(idx, 1);
    } else {
      if (maxSelect && answers[stepId].length >= maxSelect) {
        answers[stepId].shift();
      }
      answers[stepId].push(value);
    }
  } else {
    answers[stepId] = value;
  }
  renderStep();
}

function nextStep() {
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function restart() {
  currentStep = 0;
  Object.keys(answers).forEach(k => delete answers[k]);
  renderStep();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════════════════
function scoreVehicles() {
  return VEHICLES.map(v => {
    let score = 0;
    let maxScore = 0;

    // Size (20pts)
    maxScore += 20;
    if (answers.size === 'any') score += 15;
    else if (v.size === answers.size) score += 20;
    else if ((answers.size === 'mid' && v.size === 'full') || (answers.size === 'full' && v.size === 'mid')) score += 10;

    // Style (25pts — most important)
    maxScore += 25;
    if (answers.style?.length > 0) {
      const hits = v.style.filter(s => answers.style.includes(s)).length;
      const possible = Math.min(answers.style.length, v.style.length);
      if (possible > 0) score += Math.round((hits / possible) * 25);
    } else score += 15;

    // Interior (20pts)
    maxScore += 20;
    if (answers.interior?.length > 0) {
      const hits = v.interior.filter(i => answers.interior.includes(i)).length;
      const possible = Math.min(answers.interior.length, v.interior.length);
      if (possible > 0) score += Math.round((hits / possible) * 20);
    } else score += 12;

    // Exterior color (10pts)
    maxScore += 10;
    if (answers.exterior_color?.length > 0) {
      const hits = v.exterior.filter(c => answers.exterior_color.includes(c)).length;
      if (hits > 0) score += Math.min(10, Math.round((hits / answers.exterior_color.length) * 10));
    } else score += 6;

    // Powertrain (10pts)
    maxScore += 10;
    if (!answers.powertrain || answers.powertrain === 'any') score += 8;
    else if (v.powertrain.includes(answers.powertrain)) score += 10;

    // Priority (15pts)
    maxScore += 15;
    if (answers.priority?.length > 0) {
      const hits = v.priority.filter(p => answers.priority.includes(p)).length;
      if (hits > 0) score += Math.round((hits / answers.priority.length) * 15);
    } else score += 8;

    const pct = Math.round((score / maxScore) * 100);
    return { ...v, score, maxScore, pct: Math.min(99, Math.max(35, pct)) };
  }).sort((a, b) => b.pct - a.pct);
}

// ═══════════════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════════════
async function renderResults() {
  const ranked = scoreVehicles();
  const top = ranked.slice(0, 6);
  const wizard = document.getElementById('wizard');

  // Show loading state
  wizard.innerHTML = `
    <div class="step active">
      <div class="results-intro">
        <h2>Finding Your Perfect Matches...</h2>
        <p><span class="loading-spinner"></span></p>
      </div>
    </div>`;

  // Fetch images for top results
  const imgPromises = top.map(v => fetchWikiImage(v.wikiTitle, v.wikiTitleAlt));
  const images = await Promise.all(imgPromises);

  const cardsHTML = top.map((v, i) => {
    const rankLabel = i === 0 ? '🏆 #1 Top Match' : `#${i + 1} Match`;
    const rankClass = i === 0 ? 'rank-1' : '';
    const imgSrc = images[i];
    const imgSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(v.searchTerms)}&tbm=isch`;
    const reviewUrl = `https://www.google.com/search?q=${encodeURIComponent(v.name + ' ' + new Date().getFullYear() + ' review test drive')}`;
    const interiorUrl = `https://www.google.com/search?q=${encodeURIComponent(v.name + ' ' + new Date().getFullYear() + ' interior')}&tbm=isch`;
    const videoUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(v.name + ' ' + new Date().getFullYear() + ' review')}`;

    const imageHTML = imgSrc
      ? `<img src="${imgSrc}" alt="${v.name}" onerror="this.style.display='none'">`
      : '';

    return `
      <div class="result-card" style="${i === 0 ? 'border-color: rgba(201,168,76,0.3);' : ''}">
        <div class="result-body">
          <div class="result-image" style="cursor:pointer;" onclick="${imgSrc ? `openLightbox('${imgSrc}')` : ''}">
            <div class="gradient-bg" style="background: ${v.gradient}"></div>
            ${imageHTML}
            <div class="img-overlay"></div>
            ${!imgSrc ? `<div class="fallback-label">${v.brand}<br><strong>${v.name}</strong></div>` : ''}
          </div>
          <div class="result-details">
            <div class="result-rank ${rankClass}">${rankLabel}</div>
            <h3>${v.name}</h3>
            <div class="result-subtitle">${v.brand} · Starting at ${v.startingPrice}</div>
            <p class="result-desc">${v.desc}</p>
            <div class="result-tags">${v.tags.map(t => `<span class="result-tag">${t}</span>`).join('')}</div>
            <div class="match-score">
              <span style="font-size:0.85rem;color:var(--text-muted)">Match</span>
              <div class="match-bar-bg"><div class="match-bar" style="width:${v.pct}%"></div></div>
              <span class="match-pct">${v.pct}%</span>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;">
              <a class="result-cta" href="${imgSearchUrl}" target="_blank" rel="noopener">📸 Photos</a>
              <a class="result-cta" href="${interiorUrl}" target="_blank" rel="noopener">🪑 Interior</a>
              <a class="result-cta" href="${videoUrl}" target="_blank" rel="noopener">🎬 Videos</a>
              <a class="result-cta" href="${reviewUrl}" target="_blank" rel="noopener">📝 Reviews</a>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  wizard.innerHTML = `
    <div class="step active">
      <div class="results-intro">
        <h2>Your Top Matches</h2>
        <p>Based on your preferences, here are the luxury SUVs we recommend you test drive</p>
        <p style="font-size:0.85rem; margin-top:8px;">Click any car photo to enlarge it</p>
      </div>
      ${cardsHTML}
      <div style="text-align:center;padding:20px 0 60px;">
        <button class="btn btn-restart" onclick="restart()">← Start Over</button>
      </div>
    </div>`;

  renderProgressBar();
}

// Launch
init();
</script>
