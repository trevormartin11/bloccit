# Netlify config for FlipCRM.
#
# Pure static site (no build step) + two serverless functions.
# Deploy: connect this repo in the Netlify UI, or run `netlify deploy`.
#
# Env vars to set in Netlify:
#   RENTCAST_API_KEY   Your RentCast API key — https://www.rentcast.io/api

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# SPA fallback — unknown routes serve the dashboard. Netlify processes
# /.netlify/functions/* and static files BEFORE this catch-all, so the
# functions still route correctly.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
